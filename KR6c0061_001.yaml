body:
  text: 明真可撰心外無法如來實語水外無波聖人切喻但衆生從無始以來名言習氣染深難化故聞凡著凡聞聖著聖聞有著有聞無著無聞生死著生死聞涅槃著涅槃聞世界著世界聞微塵衆著微塵衆本心即隱沒被名言所轉執而忘返埋沒自性所以如來於般若會上説金剛經即世界而破微塵衆即微塵衆而破世界堅習堅習既破微塵習除虧一喪兩一兩既喪本心頓露故六祖曰不思善不思惡阿那箇是明上座本來面目此老即善惡情上指渠曉得箇無善惡的這箇無善惡的名有多種曰本性曰真心曰佛性曰本覺等故天機深者不受名言所染能即名言而悟名言不及者如此經以世界微塵衆情上如來宛轉方便借微塵衆破世界有名無實借世界破微塵衆有名無實究竟兩者名實無當情消性復即與六祖因善惡之情悟無善惡本來面目初無差別即此而觀若不能即名言了悟得名言染不得的不惟世界即一合相微塵衆亦一合相也何以故情未破故吾故曰虧一喪兩茲衆位偶聚泖上結金剛般若緣此非就地抽苗皆是多生曾親近諸佛菩薩來所以不期邂逅道人與世泊然初無他慕今更深夜靜白燭光中不惜口業世出世法將高就低種種譬喻委曲剖析此一分經雖衆位根器生熟不同或聞道人拈提或有所入或無所入解者自今日後由粗而精既精則必入神既能入神則一切名言世界微塵聖凡善惡把柄在自手裏彼名言安能轉我未解者自今日後必須要解始不負堯風中此翻邂逅且老病不與人期流芳不可把玩世出世法各須努力衆生情計不此即彼不聖即凡故曰聖凡情盡體露真常今世界可碎微塵可合則世界與微塵未始有常也而衆生於未始有常之間計世界為一計微塵為多不一即多不多即一酣計而不醒從無始以來至於今日死此生彼死彼生此究其所以不過我見未空隨處計著故如來曰一合相即不可説凡夫貪著其事利根衆生苟知合微塵而有世界世界果有乎碎世界而為微塵微塵果有乎嗚呼此貴在自悟不貴説破所以如來於此經提無生之綱於緣生之中真深慈大悲也夫碎世界而為微塵衆微塵果有乎合微塵衆而為世界世界果有乎此兩者互為主客迭相蕩洗而一多之情豈煩天風海濤鼓漱然後滌除者哉故善用其心者終日處乎一多之中而一多不能纍也反是者則不勝纍矣故此經曰一合相者即非一合相是名一合相而凡夫貪著其事者是不達一多無常主客無定故也如能達之則一合相未始非天人師焉蘇長公有言曰溪聲便是廣長舌吾則曰一合相便是廣長舌也或者以長公為是以我為非以我為是以長公為非此所謂癡人前不可説夢也世界與微塵衆往復研之但有名言俱無自體謂世界合微塵衆而有謂微塵衆碎世界而有皆衆生橫計也然此橫計不無其因始因於事不精理不徹而生事精則能了知事外無理理徹則能了知理外無事事外無理事果有乎理外無事理果有乎是以性宗不成相宗始精相宗不成性宗始圓精即圓故精而無思圓即精故圓而歷然無思故即事而契同歷然故即理而彌照此等受用自他滿足但因中易知而難證果中易證而難忘噫因中即受用果中受用忘此非披毛戴角者不能也夫我人衆生壽者四見初本一我見耳以展轉橫計遂成四見若以智眼觀之則一心不生我尚不有誰為我見我見既拔則餘者不待遣而自空矣又我見者無主宰中強作主宰之謂人見則待我而生衆生見即循情分別不能返照之謂壽者見不過貪生畏死之念也用是觀之則金剛經所説四見實不在經即在吾人周旋日用逆順之間與佛何干雖然若不是這瞿曇老漢曲折點破則茫茫大塊終古不旦矣佛問須菩提曰若人碎三千大千世界而為微塵衆是微塵衆可謂多乎須菩提曰甚多豫以是知須菩提之意以為不但多耳諦觀而察之誠乃有名無實故曰即非微塵衆是名微塵衆復次世界之意亦有名無實耳故曰即非世界是名世界蓋微塵自無其體必碎世界而有世界亦無其體必合微塵而成故以世界觀塵世現而塵不現以微塵觀世塵形而世不形或計多碎相則多碎相現計一合相則一合相現多碎相即微塵之別名一合相即世界之異稱耳若當機頓了多碎相與一合相皆有名而無實則一多之情不待掃而自盡矣一多之情既盡則我固有之心光昭然現前矣故曰凡聖情盡體露真常又此情緣一而起謂之一情緣多而起謂之多情緣凡而起謂之凡情緣聖而起謂之聖情故一一多多凡凡聖聖不過一情之橫計耳又曰遍計又曰前塵相想又曰六塵緣影皆此情之別名也圭峰科此段義謂證法界有味乎哉夫有卷則有舒有聚則有散有合則有碎此自然之理也故如來呼須菩提而告之曰若三千大千世界可碎而為微塵是微塵衆果多耶少耶須菩提承佛而言曰甚多夫碎大千世界而為微塵以凡夫心量較之則不勝其多矣若如來所知則不勝其少也豈微塵多少之數如來不知乃待須菩提定耶蓋如來逆知一切衆生雖根有鈍利之不同而執世界為一合相未始有不同者也但利根衆生一聞世界可碎而為微塵則不待須菩提言多微塵即非微塵衆是名微塵衆然後悟世界必非一合相奈鈍根衆生須待須菩提密破其微塵多衆之執然後知一合相初本非世界假衆微塵合而始成世界世界既合微塵衆而始有者則世界當一合相住時住本無住合本無合豈待碎世界而為微塵衆然後一合相始破哉又須菩提以為我與如來碎世界而為微塵合微塵而為世界合合碎碎重疊翻騰上根與中根固已皆悟世界本無合微塵而有微塵亦無碎世界而有至此則一多之執情不待觀空然後破也奈下根之難悟所以須菩提復拈三千大千世界即非世界是名世界顯告而曉之曰若世界實有者即是一合相世界若是一合相則如來往嘗又説一合相即非一合相是名一合相此又何耶如來與須菩提憫衆生執情之難破味著此身計為實有委曲翻騰而下根衆生執解未盡故如來呼須菩提而再告之曰一合相者即是不可説但凡夫之人貪著其事豈須菩提不知一合相即非一合相待如來再告之而後曉耶蓋如來借須菩提而深責下根執現前之身橫謂實有而味著也嗚呼初碎世界而為微塵徵微塵而非有微塵非有則世界無體故須菩提不先破一合相之執而先破多微塵之執蓋多微塵既破則一合相之執不待破而破矣何者多為一體多破則一無體矣一多情盡則世界與微塵皆清淨法界也指何物為世界微塵耶學者知此則我如來父子翻騰剖柝之苦心方始知也如果知之則三千大千世界之堅初碎而為微塵再合微塵而為世界何異一紙卷舒浮雲之聚散者哉
